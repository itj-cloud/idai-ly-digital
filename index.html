<!DOCTYPE html>

<html class="scroll-smooth" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>iDai.ly Digital | Editorial Web Design</title>

<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800;family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        "primary": "#9e3d11",
        "surface": "#fff8f5"
      },
      fontFamily: {
        headline: ["Newsreader", "serif"],
        body: ["Manrope", "sans-serif"]
      }
    }
  }
}
</script>

<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
</style>

</head>

<body class="bg-surface text-on-surface font-body">

<nav class="sticky top-0 bg-white p-6 shadow">
<div class="font-bold">iDai.ly Digital</div>
</nav>

<section class="p-10">
<h1 class="text-5xl font-bold">Simple Websites. Real Results.</h1>
</section>

<!-- CONTACT -->
<section id="contact" class="p-10 bg-white">

<h2 class="text-3xl font-bold mb-6">Contact</h2>

<!-- FORMSPREE FORM + TRACKING + REDIRECT -->
<form 
action="https://formspree.io/f/xyklnyqq"
method="POST"
class="space-y-4"
onsubmit="trackLead()"
>

<input name="name" class="w-full border p-3 rounded" placeholder="Name" type="text" required/>

<input name="business" class="w-full border p-3 rounded" placeholder="Business Name" type="text"/>

<input name="phone" class="w-full border p-3 rounded" placeholder="Phone" type="tel"/>

<input name="email" class="w-full border p-3 rounded" placeholder="Email" type="email" required/>

<textarea name="message" class="w-full border p-3 rounded" placeholder="Tell me about your project..." rows="4"></textarea>

<button type="submit" class="bg-black text-white px-6 py-3 rounded">
Submit
</button>

</form>

<!-- CONTACT LINKS -->
<div class="mt-6">
<a href="tel:+16318133348">(631) 813-3348</a><br/>
<a href="mailto:theiDai.ly@outlook.com">theiDai.ly@outlook.com</a>
</div>

<!-- CALENDLY -->
<div class="mt-10">
<div class="calendly-inline-widget"
data-url="https://calendly.com/theidai-ly/30min?primary_color=e16d58"
style="min-width:320px;height:700px;">
</div>

<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
</div>

</section>

<footer class="p-6 text-center">
© iDai.ly Digital
</footer>

<!-- 🔥 ADDED FUNCTIONALITY ONLY (NO DESIGN CHANGES) -->
<script>
function trackLead() {
  // basic conversion tracking (works on GitHub Pages)
  console.log("Lead submitted");

  // optional: store locally so you can measure conversions
  localStorage.setItem("lead_submitted", "true");

  // small delay so Formspree sends first, then redirect
  setTimeout(() => {
    window.location.href = "thank-you.html";
  }, 800);
}
</script>

</body>
</html>
