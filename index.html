<!DOCTYPE html>
<html class="scroll-smooth" lang="en">

<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>iDai.ly Digital | Editorial Web Design</title>

<link href="https://fonts.googleapis.com/css2?family=Newsreader:ital,opsz,wght@0,6..72,200..800;1,6..72,200..800&family=Manrope:wght@200..800&display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>

<script id="tailwind-config">
tailwind.config = {
  darkMode: "class",
  theme: {
    extend: {
      colors: {
        primary: "#9e3d11",
        surface: "#fff8f5",
        "on-surface": "#261911",
        "on-surface-variant": "#57423b",
        "secondary-container": "#feb8ab"
      },
      fontFamily: {
        headline: ["Newsreader", "serif"],
        body: ["Manrope", "sans-serif"]
      }
    }
  }
}
</script>

<style>
.material-symbols-outlined {
  font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
}
.blob-shape {
  border-radius: 42% 58% 70% 30% / 45% 45% 55% 55%;
}
</style>

</head>

<body class="bg-surface text-on-surface font-body">

<!-- NAV -->
<nav class="w-full sticky top-0 z-50 bg-white shadow">
<div class="flex justify-between items-center px-8 py-6">
  <div class="font-bold text-xl">iDai.ly Digital</div>
  <a class="bg-primary text-white px-6 py-2 rounded-full" href="#contact">Start Project</a>
</div>
</nav>

<!-- HERO -->
<section class="px-8 py-24">
  <h1 class="text-5xl font-bold">Simple Websites. Real Results.</h1>
  <p class="mt-4 text-lg">Built fast. Clean. Affordable.</p>
</section>

<!-- CONTACT -->
<section id="contact" class="px-8 py-24 bg-[#FAF6F0]">

<div class="max-w-3xl mx-auto">

<h2 class="text-4xl font-bold mb-10">Let’s Get Started</h2>

<!-- CALENDLY -->
<div class="mb-12">
<div class="calendly-inline-widget"
     data-url="https://calendly.com/theidai-ly/30min?primary_color=e16d58"
     style="min-width:320px;height:700px;"></div>
<script src="https://assets.calendly.com/assets/external/widget.js" async></script>
</div>

<!-- FORM -->
<form action="https://formspree.io/f/xyklnyqq" method="POST" class="space-y-6 bg-white p-8 rounded-xl shadow">

<div>
<input name="name" required class="w-full p-3 border rounded" placeholder="Name" type="text"/>
</div>

<div>
<input name="business" class="w-full p-3 border rounded" placeholder="Business Name" type="text"/>
</div>

<div>
<input name="phone" class="w-full p-3 border rounded" placeholder="Phone" type="tel"/>
</div>

<div>
<input name="email" required class="w-full p-3 border rounded" placeholder="Email" type="email"/>
</div>

<div>
<textarea name="message" required class="w-full p-3 border rounded" placeholder="Tell me about your project..." rows="5"></textarea>
</div>

<button class="w-full bg-primary text-white py-4 rounded-full font-bold" type="submit">
Submit Request
</button>

</form>

<!-- CLICKABLE CONTACT -->
<div class="mt-10 text-center space-y-2">

<p>
Email:
<a class="text-primary font-bold" href="mailto:goog@gmail.com">goog@gmail.com</a>
</p>

<p>
Phone:
<a class="text-primary font-bold" href="tel:6318133348">631-813-3348</a>
</p>

</div>

</div>
</section>

<!-- FOOTER -->
<footer class="py-10 text-center text-sm opacity-70">
  <p>© 2024 iDai.ly Digital</p>
</footer>

</body>
</html>
